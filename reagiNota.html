<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReagiNota — Escola Natividade</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f4f7;--bg2:#e8ebf0;--surface:#fff;--border:#dde1e9;--border2:#c8cdd8;
  --text:#1c1f2e;--text2:#515773;--text3:#8990ab;
  --teal:#0c6e52;--teal2:#0a5a44;--teal-light:#e2f5ed;--teal-mid:#a8dfc5;
  --amber:#c47600;--amber-light:#fff4e0;
  --red:#c23b2b;--red-light:#fdecea;
  --blue:#1a5fa5;--blue-light:#e6eefb;
  --nav:#111827;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 20px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.12),0 16px 48px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.nav{background:var(--nav);color:#fff;height:54px;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:40}
.nav-dot{width:32px;height:32px;background:linear-gradient(135deg,#0c6e52,#14b884);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nav-title{font-weight:700;font-size:15px;letter-spacing:-.02em}
.nav-sub{font-size:11px;color:rgba(255,255,255,.38);margin-left:4px}
.nav-turma{margin-left:auto;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:5px 14px;font-size:13px;font-weight:600;color:#fff;font-family:'Sora',sans-serif}
.layout{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;flex-shrink:0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.main{flex:1;padding:24px;overflow-y:auto;min-width:0}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:12px 8px 6px;margin-top:4px}
.sb-section:first-child{margin-top:0}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Sora',sans-serif}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.active{background:var(--teal-light);color:var(--teal);font-weight:600}
.sb-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:10px 0}
.turma-btn{display:block;width:100%;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text2);margin-bottom:5px;text-align:left;font-family:'Sora',sans-serif;transition:all .12s}
.turma-btn:hover{border-color:var(--teal);color:var(--teal)}
.turma-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.page-header{margin-bottom:22px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.03em}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--sh)}
.stat-n{font-size:26px;font-weight:700;color:var(--teal);font-family:'JetBrains Mono',monospace}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;box-shadow:var(--sh)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.card-title{font-size:14px;font-weight:600}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;border:1px solid var(--border2);background:var(--bg);color:var(--text);transition:all .12s;font-family:'Sora',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-primary:hover{background:var(--teal2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#f5c6c2}
.btn-danger:hover{background:#fadbd8}
.btn-amber{background:var(--amber-light);color:var(--amber);border-color:#ffe0a0}
.btn-amber:hover{background:#ffeec0}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'Sora',sans-serif;outline:none;transition:border-color .12s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(12,110,82,.09)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:2px solid var(--border)}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-teal{background:var(--teal-light);color:var(--teal)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-gray{background:var(--bg2);color:var(--text3)}
.modal-bg{position:fixed;inset:0;background:rgba(10,12,20,.55);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:min(580px,95vw);max-height:90vh;overflow-y:auto;box-shadow:var(--sh2);animation:mIn .16s ease}
.modal-lg{width:min(760px,95vw)}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
/* GABARITO BOLINHAS */
.gab-sheet{background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:12px 16px;max-height:400px;overflow-y:auto}
.gab-row{display:flex;align-items:center;padding:4px 6px;border-radius:8px;gap:10px}
.gab-row:hover{background:rgba(12,110,82,.04)}
.gab-row.done{background:rgba(12,110,82,.07)}
.gab-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text3);width:26px;text-align:right;flex-shrink:0}
.gab-opts{display:flex;gap:7px}
.gab-opt{width:34px;height:34px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .1s;font-family:'JetBrains Mono',monospace;user-select:none;flex-shrink:0}
.gab-opt:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.gab-opt.filled{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 2px 6px rgba(12,110,82,.3)}
.gab-opt.wrong{background:var(--red);border-color:var(--red);color:#fff}
.gab-opt.correct-outline{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.gab-sep{height:1px;background:var(--border);margin:3px 0}
/* RESULTADO */
.result-hero{border-radius:16px;padding:28px;color:#fff;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.result-nota{font-size:72px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;position:relative}
.result-sit{font-size:14px;font-weight:600;margin-top:6px;position:relative}
.result-sub{font-size:12px;opacity:.7;margin-top:4px;position:relative}
.result-bar-bg{background:rgba(255,255,255,.25);border-radius:99px;height:6px;margin-top:14px;position:relative}
.result-bar{height:100%;border-radius:99px;background:#fff;transition:width .6s ease}
.erros-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.erro-chip{padding:4px 10px;border-radius:7px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;background:var(--red-light);color:var(--red)}
/* ALUNO LISTA */
.aluno-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;background:var(--surface);transition:all .12s;cursor:default}
.aluno-card:hover{border-color:var(--teal-mid)}
.aluno-card.selecionado{border-color:var(--teal);background:var(--teal-light);box-shadow:0 0 0 2px var(--teal)}
.aluno-card.corrigido{border-color:var(--teal-mid);background:#f0fbf6}
.aluno-card.cursor-pointer{cursor:pointer}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal-mid));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--teal);flex-shrink:0}
.av.done{background:linear-gradient(135deg,#0c6e52,#14b884);color:#fff}
.ai{flex:1;min-width:0}
.an{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.am{font-size:11px;color:var(--text3);margin-top:1px}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:.6}
.turma-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.turma-chip{padding:6px 18px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .12s}
.turma-chip:hover{border-color:var(--teal);color:var(--teal)}
.turma-chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.prog-wrap{background:var(--bg2);border-radius:99px;height:5px;overflow:hidden;margin-top:3px}
.prog{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),#14b884)}
/* LAYOUT CORRIGIR */
.corr-layout{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.draft-badge{display:inline-flex;align-items:center;gap:5px;background:#fff8e6;border:1px solid #ffe0a0;color:var(--amber);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:12px}
@media(max-width:750px){
  .sidebar{display:none}
  .main{padding:16px 12px}
  .corr-layout{grid-template-columns:1fr}
  .result-nota{font-size:52px}
}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-dot">📝</div>
  <span class="nav-title">ReagiNota</span>
  <span class="nav-sub">Escola Natividade</span>
  <span class="nav-turma" id="navTurma"></span>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>
<div id="modalRoot"></div>
 
<script>
// ═══════════════════════════════════════════════
//  STORAGE — tudo salvo automaticamente
// ═══════════════════════════════════════════════
function ld(k,d){try{const v=localStorage.getItem('rn4_'+k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,v){try{localStorage.setItem('rn4_'+k,JSON.stringify(v))}catch(e){console.error('Storage:',e)}}
 
const TURMAS=['6º ano','7º ano','8º ano','9º ano'];
const MATERIAS=['Português','Matemática','Ciências','História','Geografia','Inglês','Ed. Física','Arte','Religião'];
const OPTS=['A','B','C','D','E'];
 
// Estado — cada campo tem seu próprio salvar
const S={
  get turma(){return ld('turma','6º ano')},
  set turma(v){sv('turma',v)},
  get page(){return ld('page','dashboard')},
  set page(v){sv('page',v)},
  get alunos(){return ld('alunos',{})},
  set alunos(v){sv('alunos',v)},
  get provas(){return ld('provas',[])},
  set provas(v){sv('provas',v)},
  get correcoes(){return ld('correcoes',[])},
  set correcoes(v){sv('correcoes',v)},
  // Rascunho de gabarito em edição (salvo automaticamente bolinha a bolinha)
  get draft(){return ld('draft',null)},
  set draft(v){sv('draft',v)},
  // Sessão de correção em andamento
  get sessao(){return ld('sessao',null)},
  set sessao(v){sv('sessao',v)},
  // Modal
  modal:null,
  editProvaId:null,
};
 
// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function initials(n){return n.trim().split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase()}
function alunosDaTurma(t){return (S.alunos[t||S.turma]||[])}
function provasDaTurma(t){return S.provas.filter(p=>p.turma===(t||S.turma))}
function corrDaTurma(t){return S.correcoes.filter(c=>c.turma===(t||S.turma))}
function getAluno(id,turma){return (S.alunos[turma||S.turma]||[]).find(a=>a.id===id)}
function getProva(id){return S.provas.find(p=>p.id===id)}
function notaBase(c){return c.total>0?(c.acertos/c.total)*10:0}
function situacao(nb){return nb>=7?'Aprovado':nb>=5?'Recuperação':'Reprovado'}
function badgeCor(nb){return nb>=7?'badge-teal':nb>=5?'badge-amber':'badge-red'}
function gradCor(nb){return nb>=7?'linear-gradient(135deg,#0c6e52,#0a8f68)':nb>=5?'linear-gradient(135deg,#c47600,#e89a00)':'linear-gradient(135deg,#c23b2b,#e04a37)'}
 
// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function render(){
  document.getElementById('navTurma').textContent=S.turma;
  renderSidebar();
  renderMain();
  renderModal();
}
 
function renderSidebar(){
  const pages=[
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {id:'alunos',icon:'👥',label:'Alunos'},
    {id:'gabaritos',icon:'📋',label:'Gabaritos'},
    {id:'corrigir',icon:'✏️',label:'Corrigir Prova'},
    {id:'resultados',icon:'📊',label:'Resultados'},
  ];
  document.getElementById('sidebar').innerHTML=`
    <div class="sb-section">Turmas</div>
    ${TURMAS.map(t=>`<button class="turma-btn${S.turma===t?' active':''}" onclick="setTurma('${t}')">${t}</button>`).join('')}
    <div class="sb-divider"></div>
    <div class="sb-section">Menu</div>
    ${pages.map(p=>`<button class="sb-item${S.page===p.id?' active':''}" onclick="setPage('${p.id}')"><span class="icon">${p.icon}</span>${p.label}</button>`).join('')}`;
}
 
function renderMain(){
  const map={dashboard:pageDashboard,alunos:pageAlunos,gabaritos:pageGabaritos,corrigir:pageCorrigir,resultados:pageResultados};
  document.getElementById('main').innerHTML=(map[S.page]||pageDashboard)();
}
 
// ═══════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════
function pageDashboard(){
  const als=alunosDaTurma();
  const pvs=provasDaTurma();
  const cors=corrDaTurma();
  const med=cors.length?(cors.reduce((a,b)=>a+(b.acertos/b.total)*10,0)/cors.length).toFixed(1):'—';
  const apr=cors.filter(c=>notaBase(c)>=7).length;
  return `
    <div class="page-header"><div class="page-title">Dashboard — ${S.turma}</div><div class="page-sub">Visão geral da turma</div></div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n">${als.length}</div><div class="stat-l">Alunos</div></div>
      <div class="stat"><div class="stat-n">${pvs.length}</div><div class="stat-l">Provas</div></div>
      <div class="stat"><div class="stat-n">${cors.length}</div><div class="stat-l">Correções</div></div>
      <div class="stat"><div class="stat-n">${med}</div><div class="stat-l">Média geral</div></div>
      <div class="stat"><div class="stat-n">${apr}</div><div class="stat-l">Aprovados</div></div>
    </div>
    ${cors.length?`<div class="card">
      <div class="card-hd"><div class="card-title">Últimas correções</div></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Aluno</th><th>Prova</th><th>Nota</th><th>Situação</th><th>Data</th></tr></thead>
        <tbody>${[...cors].reverse().slice(0,8).map(c=>{
          const al=getAluno(c.alunoId);const pv=getProva(c.provaId);const nb=notaBase(c);
          return`<tr><td>${al?al.nome:'—'}</td><td>${pv?pv.materia+(pv.desc?' — '+pv.desc:''):'—'}</td>
          <td><strong style="font-family:'JetBrains Mono',monospace">${((c.acertos/c.total)*(pv?pv.valor||10:10)).toFixed(1)}</strong></td>
          <td><span class="badge ${badgeCor(nb)}">${situacao(nb)}</span></td>
          <td style="color:var(--text3);font-size:12px">${c.data}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`:`<div class="card"><div class="empty"><span class="empty-icon">🎯</span><p>Nenhuma correção ainda.<br>Cadastre alunos e gabaritos para começar.</p></div></div>`}`;
}
 
// ═══════════════════════════════════════════════
//  ALUNOS
// ═══════════════════════════════════════════════
function pageAlunos(){
  const als=alunosDaTurma();
  return `
    <div class="page-header"><div class="page-title">Alunos</div></div>
    <div class="turma-chips">${TURMAS.map(t=>`<span class="turma-chip${S.turma===t?' active':''}" onclick="setTurmaPage('${t}','alunos')">${t}</span>`).join('')}</div>
    <div class="card">
      <div class="card-hd">
        <div class="card-title">${S.turma} — ${als.length} aluno${als.length!==1?'s':''}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="openModal('novoAluno')">+ Adicionar</button>
          <button class="btn btn-sm" onclick="openModal('importarAlunos')">📋 Importar lista</button>
        </div>
      </div>
      ${als.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px">
        ${[...als].sort((a,b)=>a.nome.localeCompare(b.nome)).map(a=>`
          <div class="aluno-card">
            <div class="av">${initials(a.nome)}</div>
            <div class="ai"><div class="an">${a.nome}</div>
            <div class="am">Nº ${a.numero||'—'} · ${corrDaTurma().filter(c=>c.alunoId===a.id).length} provas</div></div>
            <button class="btn btn-danger btn-sm" onclick="delAluno('${a.id}')">✕</button>
          </div>`).join('')}
      </div>`:`<div class="empty"><span class="empty-icon">👥</span><p>Nenhum aluno no ${S.turma}.</p></div>`}
    </div>`;
}
 
// ═══════════════════════════════════════════════
//  GABARITOS
// ═══════════════════════════════════════════════
function pageGabaritos(){
  const pvs=provasDaTurma();
  const draft=S.draft;
  const draftInfo=draft&&draft.turma===S.turma?`<div class="draft-badge">⚠️ Rascunho não finalizado — <button class="btn btn-sm btn-amber" style="padding:2px 8px;font-size:11px" onclick="retomaDraft()">Retomar</button></div>`:'';
  return `
    <div class="page-header"><div class="page-title">Gabaritos</div></div>
    <div class="turma-chips">${TURMAS.map(t=>`<span class="turma-chip${S.turma===t?' active':''}" onclick="setTurmaPage('${t}','gabaritos')">${t}</span>`).join('')}</div>
    ${draftInfo}
    <div class="card">
      <div class="card-hd">
        <div class="card-title">${S.turma} — ${pvs.length} gabarito${pvs.length!==1?'s':''}</div>
        <button class="btn btn-primary btn-sm" onclick="openModal('novaProva')">+ Novo Gabarito</button>
      </div>
      ${pvs.length?`<div class="tbl-wrap"><table>
        <thead><tr><th>Matéria</th><th>Descrição</th><th>Questões</th><th>Valor</th><th>Data</th><th>Correções</th><th></th></tr></thead>
        <tbody>${pvs.map(p=>{
          const nc=S.correcoes.filter(c=>c.provaId===p.id).length;
          return`<tr>
            <td><span class="badge badge-blue">${p.materia}</span></td>
            <td style="font-weight:500">${p.desc||'—'}</td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${p.nq}q</td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${p.valor||10} pts</td>
            <td style="color:var(--text3);font-size:12px">${p.data||'—'}</td>
            <td><span class="badge badge-gray">${nc}</span></td>
            <td><div style="display:flex;gap:6px">
              <button class="btn btn-amber btn-sm" onclick="editarGabarito('${p.id}')">✎ Editar</button>
              <button class="btn btn-danger btn-sm" onclick="delProva('${p.id}')">✕</button>
            </div></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`:`<div class="empty"><span class="empty-icon">📋</span><p>Nenhum gabarito para o ${S.turma}.</p></div>`}
    </div>`;
}

//  CORRIGIR — layout com lista de alunos + gabarito lado a lado
// ═══════════════════════════════════════════════
function pageCorrigir(){
  const als=alunosDaTurma();
  const pvs=provasDaTurma();
  const sess=S.sessao;
 
  if(!als.length||!pvs.length){
    return `
      <div class="page-header"><div class="page-title">Corrigir Prova</div></div>
      <div class="turma-chips">${TURMAS.map(t=>`<span class="turma-chip${S.turma===t?' active':''}" onclick="setTurmaPage('${t}','corrigir')">${t}</span>`).join('')}</div>
      <div class="card"><div class="empty"><span class="empty-icon">✏️</span>
        <p>${!als.length?`Cadastre alunos no ${S.turma} antes de corrigir.<br>`:``}${!pvs.length?`Cadastre um gabarito para o ${S.turma} antes de corrigir.`:``}</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:16px">
          ${!als.length?`<button class="btn btn-primary" onclick="setPage('alunos')">+ Alunos</button>`:''}
          ${!pvs.length?`<button class="btn btn-primary" onclick="setPage('gabaritos')">+ Gabarito</button>`:''}
        </div>
      </div></div>`;
  }
 
  // Prova selecionada
  const pvId=sess&&sess.turma===S.turma?sess.provaId:'';
  const pv=pvId?getProva(pvId):null;
 
  // Correções já feitas nesta sessão/prova
  const corrigidosIds=pvId?S.correcoes.filter(c=>c.provaId===pvId&&c.turma===S.turma).map(c=>c.alunoId):[];
 
  // Aluno selecionado
  const alId=sess&&sess.turma===S.turma?sess.alunoId:'';
  const al=alId?getAluno(alId):null;
 
  // Respostas do rascunho de correção atual
  const resps=sess&&sess.turma===S.turma&&sess.provaId===pvId&&sess.alunoId===alId?sess.resps||[]:[];
 
  const alunosList=[...als].sort((a,b)=>a.nome.localeCompare(b.nome)).map(a=>{
    const jaCorrigido=corrigidosIds.includes(a.id);
    const isSel=a.id===alId;
    const corr=jaCorrigido?S.correcoes.find(c=>c.provaId===pvId&&c.alunoId===a.id):null;
    const nb=corr?notaBase(corr):null;
    return `
      <div class="aluno-card${isSel?' selecionado':''}${jaCorrigido?' corrigido':''} cursor-pointer" onclick="selecionarAluno('${a.id}')">
        <div class="av${jaCorrigido?' done':''}">${jaCorrigido?'✓':initials(a.nome)}</div>
        <div class="ai">
          <div class="an">${a.nome}</div>
          <div class="am">${jaCorrigido?`Nota: <strong>${((corr.acertos/corr.total)*(getProva(corr.provaId)?.valor||10)).toFixed(1)}</strong> — ${situacao(nb)}`:'Aguardando correção'}</div>
        </div>
        ${isSel?'<span style="font-size:18px">✏️</span>':''}
      </div>`;
  }).join('');
 
  // Gabarito de respostas do aluno
  let gabHTML='';
  if(pv&&al){
    gabHTML=`
      <div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:600;font-size:14px">${al.nome}</div>
          <div style="font-size:12px;color:var(--text3)">${pv.materia}${pv.desc?' — '+pv.desc:''} · ${pv.nq} questões · ${pv.valor||10} pts</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="calcularNota()">Calcular Nota →</button>
      </div>
      <div class="gab-sheet" id="gabRespostas">${buildRespostasSheet(pv,resps)}</div>
      <div id="resultadoInline"></div>`;
  } else if(pv){
    gabHTML=`<div class="empty" style="padding:32px"><span class="empty-icon">👈</span><p>Selecione um aluno ao lado para iniciar a correção</p></div>`;
  }
 
  return `
    <div class="page-header"><div class="page-title">Corrigir Prova</div><div class="page-sub">Selecione a prova e depois o aluno</div></div>
    <div class="turma-chips">${TURMAS.map(t=>`<span class="turma-chip${S.turma===t?' active':''}" onclick="setTurmaPage('${t}','corrigir')">${t}</span>`).join('')}</div>
    <div class="card" style="margin-bottom:12px">
      <div class="form-row" style="margin-bottom:0">
        <label>Prova / Gabarito</label>
        <select id="selProva" onchange="selecionarProva(this.value)">
          <option value="">-- Selecione a prova --</option>
          ${pvs.map(p=>`<option value="${p.id}"${p.id===pvId?' selected':''}>${p.materia}${p.desc?' — '+p.desc:''} (${p.nq}q · ${p.valor||10}pts)</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="corr-layout">
      <div>
        <div class="card-title" style="margin-bottom:10px;padding:0 2px">Alunos — ${als.length} <span style="font-size:11px;color:var(--text3);font-weight:400">(${corrigidosIds.length} corrigidos)</span></div>
        ${pvId?alunosList:`<div class="card"><div class="empty" style="padding:24px"><span class="empty-icon" style="font-size:28px">☝️</span><p style="font-size:13px">Selecione uma prova acima</p></div></div>`}
      </div>
      <div class="card">${pv?gabHTML:`<div class="empty"><span class="empty-icon">📋</span><p>Selecione uma prova acima para começar</p></div>`}</div>
    </div>`;
}
 
function buildRespostasSheet(pv, resps){
  let html='';
  for(let i=0;i<pv.nq;i++){
    const sel=resps[i]||null;
    const sep=(i>0&&i%5===0)?'<div class="gab-sep"></div>':'';
    const opts=OPTS.map(o=>`<div class="gab-opt${o===sel?' filled':''}" onclick="marcarResposta(${i},'${o}')" data-q="${i}" data-o="${o}">${o}</div>`).join('');
    html+=sep+`<div class="gab-row${sel?' done':''}" id="rrow_${i}">
      <div class="gab-num">${String(i+1).padStart(2,'0')}</div>
      <div class="gab-opts">${opts}</div>
    </div>`;
  }
  return html;
}
 
function selecionarProva(pvId){
  // Salva sessão com nova prova, limpa aluno e respostas
  const sess=S.sessao||{};
  S.sessao={...sess, turma:S.turma, provaId:pvId, alunoId:'', resps:[]};
  renderMain();
}
 
function selecionarAluno(alId){
  const sess=S.sessao||{};
  // Se mudar de aluno, limpar respostas e resultado inline
  const sessAtual=sess.alunoId===alId?sess:{...sess,alunoId:alId,resps:[]};
  S.sessao=sessAtual;
  renderMain();
}
 
function marcarResposta(q, o){
  // Atualizar visualmente SEM re-render (para não perder o foco)
  const row=document.getElementById('rrow_'+q);
  if(row){
    row.classList.add('done');
    row.querySelectorAll('.gab-opt').forEach(el=>{
      el.classList.remove('filled');
      if(el.dataset.o===o) el.classList.add('filled');
    });
  }
  // Salvar no localStorage imediatamente
  const sess=S.sessao||{};
  const resps=[...(sess.resps||[])];
  resps[q]=o;
  S.sessao={...sess, resps};
}
 
function calcularNota(){
  const sess=S.sessao;
  if(!sess||!sess.provaId||!sess.alunoId){alert('Selecione prova e aluno.');return}
  const pv=getProva(sess.provaId);
  const al=getAluno(sess.alunoId);
  if(!pv||!al) return;
 
  const resps=Array.from({length:pv.nq},(_,i)=>(sess.resps||[])[i]||null);
  const sem=resps.filter(r=>!r).length;
  if(sem>0&&!confirm(`${sem} questão(ões) sem resposta. Continuar assim?`)) return;
 
  // Calcular acertos
  let acertos=0;
  const erros=[];
  for(let i=0;i<pv.nq;i++){
    if(resps[i]===pv.gab[i]) acertos++;
    else erros.push({q:i+1,deu:resps[i],era:pv.gab[i]});
  }
 
  const valor=parseFloat(pv.valor)||10;
  const nb=(acertos/pv.nq)*10;
  const notaFinal=(acertos/pv.nq)*valor;
  const pct=Math.round((acertos/pv.nq)*100);
 
  // SALVAR CORREÇÃO IMEDIATAMENTE no localStorage
  const novaCorrecao={
    id:uid(),
    turma:S.turma,
    provaId:pv.id,
    alunoId:al.id,
    acertos,
    total:pv.nq,
    nota:parseFloat(notaFinal.toFixed(2)),
    resps:resps.slice(),
    data:new Date().toLocaleDateString('pt-BR')
  };
  const cors=[...S.correcoes];
  // Substituir se já existe correção deste aluno nesta prova
  const idx=cors.findIndex(c=>c.provaId===pv.id&&c.alunoId===al.id&&c.turma===S.turma);
  if(idx>=0) cors[idx]=novaCorrecao;
  else cors.push(novaCorrecao);
  S.correcoes=cors; // salva no localStorage
 
  // Limpar sessão de respostas deste aluno
  S.sessao={...sess, alunoId:'', resps:[]};
 
  // Mostrar resultado inline
  const area=document.getElementById('resultadoInline');
  if(area){
    area.innerHTML=`
      <div class="result-hero" style="background:${gradCor(nb)};margin-top:14px">
        <div class="result-nota">${notaFinal.toFixed(1)}</div>
        <div class="result-sit">${situacao(nb)} — ${al.nome}</div>
        <div class="result-sub">${acertos}/${pv.nq} corretas (${pct}%)</div>
        <div class="result-bar-bg"><div class="result-bar" style="width:${pct}%"></div></div>
      </div>
      ${erros.length?`<div class="card"><div class="card-title" style="margin-bottom:10px">Questões erradas — ${erros.length}</div>
        <div class="erros-grid">${erros.map(e=>`<span class="erro-chip">Q${e.q}: ${e.deu||'—'} → ${e.era}</span>`).join('')}</div>
      </div>`:`<div class="card" style="text-align:center;padding:18px"><span style="font-size:28px">🎉</span><br><strong style="color:var(--teal)">Gabarito perfeito!</strong></div>`}
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn btn-primary" onclick="proximoAluno()">Próximo Aluno →</button>
        <button class="btn" onclick="setPage('resultados')">Ver Resultados</button>
      </div>`;
  }
 
  // Atualizar lista de alunos sem re-renderizar tudo
  renderMain();
}
 
function proximoAluno(){
  // Encontrar próximo aluno não corrigido
  const sess=S.sessao||{};
  const pvId=sess.provaId;
  if(!pvId){renderMain();return}
  const corrigidos=S.correcoes.filter(c=>c.provaId===pvId&&c.turma===S.turma).map(c=>c.alunoId);
  const als=[...alunosDaTurma()].sort((a,b)=>a.nome.localeCompare(b.nome));
  const proximo=als.find(a=>!corrigidos.includes(a.id));
  if(proximo){
    S.sessao={...sess,alunoId:proximo.id,resps:[]};
  } else {
    S.sessao={...sess,alunoId:'',resps:[]};
    alert('Todos os alunos desta turma foram corrigidos nesta prova! ✓');
  }
  renderMain();
}

    <div class="stats-row">

    </div>
    <div class="card">
      <div class="card-hd">
        <div class="card-title">${S.turma}</div>

        <tbody>${[...cors].reverse().map(c=>{
          const al=getAluno(c.alunoId);const pv=getProva(c.provaId);

            <td style="font-weight:500">${al?al.nome:'—'}</td>

              <div class="prog-wrap"><div class="prog" style="width:${pct}%"></div></div></div></td>
            <td><span class="badge ${badgeCor(nb)}">${situacao(nb)}</span></td>
            <td style="color:var(--text3);font-size:12px">${c.data}</td>

        }).join('')}</tbody>
      </table></div>`:`<div class="empty"><span class="empty-icon">📊</span><p>Nenhuma correção para o ${S.turma}.</p></div>`}
    </div>`;

//  MODAL — GABARITO (com autosave bolinha a bolinha)
// ═══════════════════════════════════════════════
function renderModal(){
  const root=document.getElementById('modalRoot');
  if(!S.modal){root.innerHTML='';return}
  if(S.modal==='novoAluno') root.innerHTML=modalNovoAluno();
  else if(S.modal==='importarAlunos') root.innerHTML=modalImportarAlunos();
  else if(S.modal==='novaProva'||S.modal==='editarProva') root.innerHTML=modalProva();
}
 
function modalNovoAluno(){
  return`<div class="modal-bg" onclick="closeModal(event)"><div class="modal">
    <h3>Adicionar Aluno — ${S.turma}</h3>
    <div class="form-grid">
      <div class="form-row"><label>Nome completo</label><input id="m_nome" type="text" placeholder="Nome do aluno" autofocus></div>
      <div class="form-row"><label>Número</label><input id="m_num" type="number" placeholder="01" min="1" max="99"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalBtn()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarAluno()">Adicionar</button>
    </div>
  </div></div>`;
}
 
function modalImportarAlunos(){
  return`<div class="modal-bg" onclick="closeModal(event)"><div class="modal">
    <h3>Importar Lista — ${S.turma}</h3>
    <div class="form-row"><label>Cole os nomes (um por linha)</label>
      <textarea id="m_lista" rows="10" placeholder="Maria Silva&#10;João Santos&#10;Ana Oliveira&#10;..."></textarea>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-top:-6px;margin-bottom:10px">Nomes duplicados serão ignorados.</div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModalBtn()">Cancelar</button>
      <button class="btn btn-primary" onclick="importarAlunos()">Importar</button>
    </div>
  </div></div>`;
}
 
function modalProva(){
  const editando=S.modal==='editarProva';
  const pv=editando?getProva(S.editProvaId):null;
 
  // Carregar draft (rascunho salvo automaticamente) se não for edição
  let draft=S.draft;
  let draftAtivo=!editando&&draft&&draft.turma===S.turma;
 
  const nq=editando?(pv?pv.nq:10):(draftAtivo?draft.nq:10);
  const gab=editando?(pv?[...pv.gab]:[]):(draftAtivo?[...draft.gab]:[]);
  const mat=editando?(pv?pv.materia:'Português'):(draftAtivo?draft.materia:'Português');
  const desc=editando?(pv?pv.desc||'':''):(draftAtivo?draft.desc||'':'');
  const data=editando?(pv?pv.data||'':''):(draftAtivo?draft.data||'':'');
  const valor=editando?(pv?pv.valor||10:10):(draftAtivo?draft.valor||10:10);
 
  function gabRows(nqr,gabr){
    return Array.from({length:nqr},(_,i)=>{
      const sel=gabr[i]||null;
      const sep=(i>0&&i%5===0)?'<div class="gab-sep"></div>':'';
      const opts=OPTS.map(o=>`<div class="gab-opt${o===sel?' filled':''}" onclick="modalSelGab(${i},'${o}')" data-mq="${i}" data-mo="${o}">${o}</div>`).join('');
      return sep+`<div class="gab-row${sel?' done':''}" id="mgabrow_${i}">
        <div class="gab-num">${String(i+1).padStart(2,'0')}</div>
        <div class="gab-opts">${opts}</div>
      </div>`;
    }).join('');
  }
 
  // Inicializar modalGabTemp
  modalGabTemp={};
  gab.forEach((v,i)=>{if(v) modalGabTemp[i]=v;});
 
  return`<div class="modal-bg" onclick="closeModal(event)"><div class="modal modal-lg">
    <h3>${editando?'Editar Gabarito':'Novo Gabarito'} — ${S.turma}${draftAtivo?' <span style="font-size:12px;color:var(--amber);font-weight:400">(rascunho recuperado ✓)</span>':''}</h3>
    <div class="form-grid col3">
      <div class="form-row"><label>Matéria</label>
        <select id="m_mat" onchange="autoSaveDraft()">${MATERIAS.map(m=>`<option${mat===m?' selected':''}>${m}</option>`).join('')}</select>
      </div>
      <div class="form-row"><label>Nº de Questões</label>
        <input id="m_nq" type="number" value="${nq}" min="1" max="60" onchange="modalMudaNQ(this.value)">
      </div>
      <div class="form-row"><label>Valor da prova (pts)</label>
        <input id="m_val" type="number" value="${valor}" min="1" max="100" step="0.5" onchange="autoSaveDraft()">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label>Descrição</label>
        <input id="m_desc" type="text" placeholder="Ex: 1ª Avaliação Bimestral" value="${desc}" oninput="autoSaveDraft()">
      </div>
      <div class="form-row"><label>Data</label>
        <input id="m_data" type="date" value="${data}" onchange="autoSaveDraft()">
      </div>
    </div>
    <div class="form-row">
      <label>Gabarito oficial — clique nas bolinhas</label>
      <div class="gab-sheet" id="modalGabSheet">${gabRows(nq,gab)}</div>
    </div>
    <div class="modal-footer">
      ${!editando?`<button class="btn btn-danger" onclick="descartarDraft()">Descartar</button>`:''}
      <button class="btn" onclick="closeModalBtn()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarProva(${editando?`'${S.editProvaId}'`:'null'})">
        ${editando?'Salvar Alterações':'Salvar Gabarito'}
      </button>
    </div>
  </div></div>`;
}
 
let modalGabTemp={};
 
function modalSelGab(q,o){
  modalGabTemp[q]=o;
  // Atualizar visual
  const row=document.getElementById('mgabrow_'+q);
  if(row){
    row.classList.add('done');
    row.querySelectorAll('.gab-opt').forEach(el=>{
      el.classList.remove('filled');
      if(el.dataset.mo===o) el.classList.add('filled');
    });
  }
  // Autosave imediato
  autoSaveDraft();
}
 
function autoSaveDraft(){
  // Só salva draft se não for edição
  if(S.modal!=='novaProva') return;
  const nq=Math.min(parseInt(document.getElementById('m_nq')?.value)||10,60);
  const gab=Array.from({length:nq},(_,i)=>modalGabTemp[i]||null);
  S.draft={
    turma:S.turma,
    materia:document.getElementById('m_mat')?.value||'Português',
    desc:document.getElementById('m_desc')?.value||'',
    data:document.getElementById('m_data')?.value||'',
    valor:parseFloat(document.getElementById('m_val')?.value)||10,
    nq, gab,
    ts:Date.now()
  };
}
 
function modalMudaNQ(nqStr){
  const nq=Math.min(parseInt(nqStr)||10,60);
  modalGabTemp={...modalGabTemp}; // manter respostas existentes
  const sheet=document.getElementById('modalGabSheet');
  if(!sheet) return;
  let html='';
  for(let i=0;i<nq;i++){
    const sel=modalGabTemp[i]||null;
    const sep=(i>0&&i%5===0)?'<div class="gab-sep"></div>':'';
    const opts=OPTS.map(o=>`<div class="gab-opt${o===sel?' filled':''}" onclick="modalSelGab(${i},'${o}')" data-mq="${i}" data-mo="${o}">${o}</div>`).join('');
    html+=sep+`<div class="gab-row${sel?' done':''}" id="mgabrow_${i}">
      <div class="gab-num">${String(i+1).padStart(2,'0')}</div>
      <div class="gab-opts">${opts}</div>
    </div>`;
  }
  sheet.innerHTML=html;
  autoSaveDraft();
}
 
function retomaDraft(){
  S.modal='novaProva';
  renderModal();
}
 
function descartarDraft(){
  if(!confirm('Descartar o rascunho?')) return;
  S.draft=null;
  closeModalBtn();
}
 
// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════
function salvarAluno(){
  const nome=document.getElementById('m_nome')?.value.trim();
  const num=document.getElementById('m_num')?.value.trim();
  if(!nome){alert('Informe o nome do aluno.');return}
  const als={...S.alunos};
  if(!als[S.turma]) als[S.turma]=[];
  if(als[S.turma].find(a=>a.nome.toLowerCase()===nome.toLowerCase())){alert('Aluno já cadastrado!');return}
  als[S.turma].push({id:uid(),nome,numero:num||''});
  S.alunos=als;
  closeModalBtn();renderMain();
}
 
function importarAlunos(){
  const txt=document.getElementById('m_lista')?.value||'';
  const nomes=txt.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!nomes.length){alert('Nenhum nome encontrado.');return}
  const als={...S.alunos};
  if(!als[S.turma]) als[S.turma]=[];
  let add=0;
  nomes.forEach(nome=>{
    if(!als[S.turma].find(a=>a.nome.toLowerCase()===nome.toLowerCase())){
      als[S.turma].push({id:uid(),nome,numero:String(als[S.turma].length+1).padStart(2,'0')});
      add++;
    }
  });
  S.alunos=als;
  closeModalBtn();renderMain();
  alert(`${add} aluno(s) importado(s)!`);
}
 
function delAluno(id){
  if(!confirm('Excluir este aluno?')) return;
  const als={...S.alunos};
  als[S.turma]=(als[S.turma]||[]).filter(a=>a.id!==id);
  S.alunos=als;renderMain();
}
 
function salvarProva(editId){
  const nq=Math.min(parseInt(document.getElementById('m_nq')?.value)||10,60);
  const gab=Array.from({length:nq},(_,i)=>modalGabTemp[i]||'A');
  const prova={
    id:editId&&editId!=='null'?editId:uid(),
    turma:S.turma,
    materia:document.getElementById('m_mat')?.value||'Português',
    desc:document.getElementById('m_desc')?.value||'',
    data:document.getElementById('m_data')?.value||'',
    valor:parseFloat(document.getElementById('m_val')?.value)||10,
    nq,gab
  };
  const pvs=[...S.provas];
  if(editId&&editId!=='null'){
    const idx=pvs.findIndex(p=>p.id===editId);
    if(idx>=0) pvs[idx]=prova; else pvs.push(prova);
  } else {
    pvs.push(prova);
  }
  S.provas=pvs;
  // Limpar draft após salvar
  if(!editId||editId==='null') S.draft=null;
  modalGabTemp={};
  S.editProvaId=null;
  closeModalBtn();renderMain();
}
 
function editarGabarito(id){
  modalGabTemp={};
  const pv=getProva(id);
  if(pv) pv.gab.forEach((v,i)=>{if(v) modalGabTemp[i]=v;});
  S.editProvaId=id;
  S.modal='editarProva';
  renderModal();
}
 
function delProva(id){
  const nc=S.correcoes.filter(c=>c.provaId===id).length;
  if(!confirm(`Excluir este gabarito?${nc?` ${nc} correção(ões) também serão excluídas.`:''}`)) return;
  S.provas=S.provas.filter(p=>p.id!==id);
  S.correcoes=S.correcoes.filter(c=>c.provaId!==id);
  renderMain();
}
 
function delCorrecao(id){
  if(!confirm('Excluir esta correção?')) return;
  S.correcoes=S.correcoes.filter(c=>c.id!==id);
  renderMain();
}
 
function limparResultados(){
  if(!confirm('Apagar TODAS as correções do '+S.turma+'?')) return;
  S.correcoes=S.correcoes.filter(c=>c.turma!==S.turma);
  renderMain();
}
 
function openModal(m){S.modal=m;if(m==='novaProva'){modalGabTemp={};const d=S.draft;if(d&&d.turma===S.turma){d.gab.forEach((v,i)=>{if(v) modalGabTemp[i]=v;})}}renderModal();}
function closeModalBtn(){S.modal=null;S.editProvaId=null;renderModal();}
function closeModal(e){if(e.target.classList.contains('modal-bg'))closeModalBtn();}
function setPage(p){S.page=p;renderSidebar();renderMain();}
function setTurma(t){S.turma=t;render();}
function setTurmaPage(t,p){S.turma=t;S.page=p;render();}
 
render();
</script>

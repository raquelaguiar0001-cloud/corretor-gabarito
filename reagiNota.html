<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReagiNota — Escola Natividade</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f7;
  --bg2: #e8ebf0;
  --surface: #ffffff;
  --border: #dde1e9;
  --border2: #c8cdd8;
  --text: #1c1f2e;
  --text2: #515773;
  --text3: #8990ab;
  --teal: #0c6e52;
  --teal2: #0a5a44;
  --teal-light: #e2f5ed;
  --teal-mid: #a8dfc5;
  --amber: #c47600;
  --amber-light: #fff4e0;
  --red: #c23b2b;
  --red-light: #fdecea;
  --blue: #1a5fa5;
  --blue-light: #e6eefb;
  --purple: #5b3db5;
  --purple-light: #ede9fb;
  --nav: #111827;
  --shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 20px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.12), 0 16px 48px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
 
/* NAV */
.nav{background:var(--nav);color:#fff;height:54px;display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:40;border-bottom:1px solid rgba(255,255,255,.07)}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-dot{width:32px;height:32px;background:linear-gradient(135deg,#0c6e52,#14b884);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nav-title{font-weight:700;font-size:15px;letter-spacing:-.02em}
.nav-sub{font-size:11px;color:rgba(255,255,255,.38);margin-left:6px;font-weight:400}
.nav-turma{margin-left:auto;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:5px 14px;font-size:13px;font-weight:600;color:#fff;font-family:'Sora',sans-serif;cursor:default}
 
/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 54px)}
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;flex-shrink:0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.main{flex:1;padding:24px;overflow-y:auto;min-width:0}
 
/* SIDEBAR */
.sb-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:12px 8px 6px;margin-top:4px}
.sb-section:first-child{margin-top:0}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .12s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Sora',sans-serif}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.active{background:var(--teal-light);color:var(--teal);font-weight:600}
.sb-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-divider{height:1px;background:var(--border);margin:10px 0}
.turma-btn{display:block;width:100%;padding:7px 10px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text2);margin-bottom:5px;text-align:left;font-family:'Sora',sans-serif;transition:all .12s}
.turma-btn:hover{border-color:var(--teal);color:var(--teal)}
.turma-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
 
/* HEADER */
.page-header{margin-bottom:22px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}
 
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.stat-n{font-size:26px;font-weight:700;color:var(--teal);font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px}
 
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}
 
/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;border:1px solid var(--border2);background:var(--bg);color:var(--text);transition:all .12s;font-family:'Sora',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg2);border-color:var(--border2)}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-primary:hover{background:var(--teal2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#f5c6c2}
.btn-danger:hover{background:#fadbd8}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg);border-color:var(--border)}
.btn-amber{background:var(--amber-light);color:var(--amber);border-color:#ffe0a0}
.btn-amber:hover{background:#ffeec0}
 
/* FORM */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'Sora',sans-serif;transition:border-color .12s;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(12,110,82,.09)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.col3{grid-template-columns:1fr 1fr 1fr}
 
/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:2px solid var(--border)}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
 
/* BADGE */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-teal{background:var(--teal-light);color:var(--teal)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-purple{background:var(--purple-light);color:var(--purple)}
.badge-gray{background:var(--bg2);color:var(--text3)}
 
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,12,20,.55);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:min(580px,95vw);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:mIn .16s ease}
.modal-lg{width:min(780px,95vw)}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:20px;letter-spacing:-.02em}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
 
/* GABARITO BOLINHAS */
.gab-sheet{background:var(--bg);border:1.5px solid var(--border2);border-radius:12px;padding:16px;max-height:420px;overflow-y:auto}
.gab-row{display:flex;align-items:center;padding:5px 8px;border-radius:8px;gap:10px;transition:background .1s}
.gab-row:hover{background:rgba(12,110,82,.05)}
.gab-row.selected-row{background:rgba(12,110,82,.08)}
.gab-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text3);width:28px;text-align:right;flex-shrink:0}
.gab-opts{display:flex;gap:8px}
.gab-opt{width:34px;height:34px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .12s;font-family:'JetBrains Mono',monospace;user-select:none;flex-shrink:0}
.gab-opt:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.gab-opt.filled{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 2px 6px rgba(12,110,82,.3)}
.gab-opt.filled-wrong{background:var(--red);border-color:var(--red);color:#fff}
.gab-opt.filled-correct{background:var(--teal);border-color:var(--teal);color:#fff}
.gab-opt.correct-answer{border-color:var(--teal);color:var(--teal)}
.gab-sep{height:1px;background:var(--border);margin:4px 0}
 
/* RESULTADO */
.result-hero{background:linear-gradient(135deg,#0c6e52,#0a8f68);border-radius:16px;padding:28px;color:#fff;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.result-hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23fff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.result-nota{font-size:72px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;position:relative}
.result-sit{font-size:14px;font-weight:600;opacity:.85;margin-top:6px;position:relative}
.result-sub{font-size:12px;opacity:.65;margin-top:4px;position:relative}
.result-bar-wrap{background:rgba(255,255,255,.25);border-radius:99px;height:6px;margin-top:12px;position:relative}
.result-bar{height:100%;border-radius:99px;background:#fff;transition:width .6s ease}
 
.erros-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.erro-chip{padding:4px 10px;border-radius:7px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500}
.erro-chip.wrong{background:var(--red-light);color:var(--red)}
.erro-chip.right{background:var(--teal-light);color:var(--teal)}
 
/* ALUNO CARD */
.aluno-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;background:var(--surface);transition:all .12s}
.aluno-card:hover{border-color:var(--teal-mid);box-shadow:0 2px 8px rgba(12,110,82,.07)}
.aluno-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--teal-light),var(--teal-mid));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--teal);flex-shrink:0}
.aluno-info{flex:1;min-width:0}
.aluno-nome{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aluno-meta{font-size:11px;color:var(--text3);margin-top:1px}
 
/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--text3)}
.empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:.6}
.empty p{font-size:14px;line-height:1.6}
 
/* PROGRESS BAR */
.prog-wrap{background:var(--bg2);border-radius:99px;height:6px;overflow:hidden;margin:6px 0}
.prog{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--teal),#14b884);transition:width .5s ease}
 
/* TABS */
.tabs-bar{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .12s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'Sora',sans-serif}
.tab:hover{color:var(--text)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}
 
/* CHIPS turma selector */
.turma-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.turma-chip{padding:6px 18px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .12s}
.turma-chip:hover{border-color:var(--teal);color:var(--teal)}
.turma-chip.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 2px 8px rgba(12,110,82,.22)}
 
@media(max-width:700px){
  .sidebar{display:none}
  .main{padding:16px 12px}
  .form-grid{grid-template-columns:1fr}
  .result-nota{font-size:52px}
}
</style>
</head>
<body>
 
<div class="nav">
  <div class="nav-brand">
    <div class="nav-dot">📝</div>
    <span class="nav-title">ReagiNota</span>
    <span class="nav-sub">Escola Natividade</span>
  </div>
  <span class="nav-turma" id="navTurma">6º ano</span>
</div>
 
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>
 
<div id="modalRoot"></div>
 
<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const TURMAS = ['6º ano','7º ano','8º ano','9º ano'];
const MATERIAS = ['Português','Matemática','Ciências','História','Geografia','Inglês','Ed. Física','Arte','Religião'];
const OPTS = ['A','B','C','D','E'];
 
function ld(k,d){try{return JSON.parse(localStorage.getItem('rn3_'+k))||d}catch{return d}}
function sv(k,v){localStorage.setItem('rn3_'+k,JSON.stringify(v))}
 
let S = {
  turma: '6º ano',
  page: 'dashboard',
  alunos: ld('alunos', {}),      // {turma: [{id,nome,numero}]}
  provas: ld('provas', []),       // [{id,turma,materia,desc,data,gab[],valor,nq}]
  correcoes: ld('correcoes', []), // [{id,turma,provaId,alunoId,resps[],nota,acertos,data}]
  modal: null,
  editProvaId: null,
  corrigirProvaId: null,
};
 
function save(){sv('alunos',S.alunos);sv('provas',S.provas);sv('correcoes',S.correcoes)}
 
// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function initials(n){return n.trim().split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase()}
function alunosDaTurma(){return S.alunos[S.turma]||[]}
function provasDaTurma(){return S.provas.filter(p=>p.turma===S.turma)}
function corrDaTurma(){return S.correcoes.filter(c=>c.turma===S.turma)}
function getAluno(id){return (S.alunos[S.turma]||[]).find(a=>a.id===id)}
function getProva(id){return S.provas.find(p=>p.id===id)}
function notaFormatada(nota,valor){
  if(valor && valor!=10) return (nota*valor/10).toFixed(1)+' / '+valor;
  return nota.toFixed(1);
}
 
// ══════════════════════════════════════════
//  RENDER PRINCIPAL
// ══════════════════════════════════════════
function render(){
  document.getElementById('navTurma').textContent = S.turma;
  renderSidebar();
  renderMain();
  renderModal();
}
 
function renderSidebar(){
  const pages = [
    {id:'dashboard',icon:'🏠',label:'Dashboard'},
    {id:'alunos',icon:'👥',label:'Alunos'},
    {id:'gabaritos',icon:'📋',label:'Gabaritos'},
    {id:'corrigir',icon:'✏️',label:'Corrigir Prova'},
    {id:'resultados',icon:'📊',label:'Resultados'},
  ];
  const turmasBtns = TURMAS.map(t=>
    `<button class="turma-btn${S.turma===t?' active':''}" onclick="setTurma('${t}')">${t}</button>`
  ).join('');
  const items = pages.map(p=>
    `<button class="sb-item${S.page===p.id?' active':''}" onclick="setPage('${p.id}')">
      <span class="icon">${p.icon}</span>${p.label}
    </button>`
  ).join('');
  document.getElementById('sidebar').innerHTML = `
    <div class="sb-section">Turmas</div>
    ${turmasBtns}
    <div class="sb-divider"></div>
    <div class="sb-section">Menu</div>
    ${items}`;
}
 
function renderMain(){
  const pages = {
    dashboard: pageDashboard,
    alunos: pageAlunos,
    gabaritos: pageGabaritos,
    corrigir: pageCorrigir,
    resultados: pageResultados,
  };
  document.getElementById('main').innerHTML = (pages[S.page]||pageDashboard)();
}
 
// ══════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════
function pageDashboard(){
  const als = alunosDaTurma();
  const pvs = provasDaTurma();
  const cors = corrDaTurma();
  const med = cors.length?(cors.reduce((a,b)=>a+b.nota,0)/cors.length).toFixed(1):'—';
  const apr = cors.filter(c=>c.nota>=5).length;
  return `
    <div class="page-header">
      <div class="page-title">Dashboard — ${S.turma}</div>
      <div class="page-sub">Visão geral do desempenho da turma</div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n">${als.length}</div><div class="stat-l">Alunos</div></div>
      <div class="stat"><div class="stat-n">${pvs.length}</div><div class="stat-l">Provas</div></div>
      <div class="stat"><div class="stat-n">${cors.length}</div><div class="stat-l">Correções</div></div>
      <div class="stat"><div class="stat-n">${med}</div><div class="stat-l">Média geral</div></div>
      <div class="stat"><div class="stat-n">${apr}</div><div class="stat-l">Aprovados</div></div>
    </div>
    ${cors.length?`
    <div class="card">
      <div class="card-hd"><div class="card-title">Últimas correções</div></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Aluno</th><th>Prova</th><th>Nota</th><th>Situação</th><th>Data</th></tr></thead>
        <tbody>${[...cors].reverse().slice(0,8).map(c=>{
          const al = getAluno(c.alunoId);
          const pv = getProva(c.provaId);
          const sit = c.nota>=7?'Aprovado':c.nota>=5?'Recuperação':'Reprovado';
          const bc = c.nota>=7?'badge-teal':c.nota>=5?'badge-amber':'badge-red';
          return `<tr>
            <td>${al?al.nome:'—'}</td>
            <td>${pv?pv.materia+' — '+(pv.desc||'s/d'):'—'}</td>
            <td><strong style="font-family:'JetBrains Mono',monospace">${c.nota.toFixed(1)}</strong></td>
            <td><span class="badge ${bc}">${sit}</span></td>
            <td style="color:var(--text3);font-size:12px">${c.data}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`:`
    <div class="card"><div class="empty"><span class="empty-icon">🎯</span><p>Nenhuma correção ainda para o ${S.turma}.<br>Cadastre alunos e gabaritos para começar.</p></div></div>`}`;
}
 
// ══════════════════════════════════════════
//  ALUNOS
// ══════════════════════════════════════════
function pageAlunos(){
  const als = alunosDaTurma();
  const turmaChips = TURMAS.map(t=>
    `<span class="turma-chip${S.turma===t?' active':''}" onclick="setTurmaPage('${t}','alunos')">${t}</span>`
  ).join('');
  return `
    <div class="page-header">
      <div class="page-title">Alunos</div>
      <div class="page-sub">Gerencie os alunos de cada turma</div>
    </div>
    <div class="turma-chips">${turmaChips}</div>
    <div class="card">
      <div class="card-hd">
        <div class="card-title">${S.turma} — ${als.length} aluno${als.length!==1?'s':''}</div>
        <div class="card-actions">
          <button class="btn btn-primary btn-sm" onclick="openModal('novoAluno')">+ Adicionar Aluno</button>
          <button class="btn btn-sm" onclick="openModal('importarAlunos')">📋 Importar lista</button>
        </div>
      </div>
      ${als.length?`
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">
          ${als.sort((a,b)=>a.nome.localeCompare(b.nome)).map(a=>`
            <div class="aluno-card">
              <div class="aluno-avatar">${initials(a.nome)}</div>
              <div class="aluno-info">
                <div class="aluno-nome">${a.nome}</div>
                <div class="aluno-meta">Nº ${a.numero||'—'} · ${corrDaTurma().filter(c=>c.alunoId===a.id).length} provas</div>
              </div>

function buildGabSheet(nq, selecionadas, mostrarErros, gabarito){
  let html = '';
  for(let i=0;i<nq;i++){
    const sel = selecionadas[i]||null;
    const par = i%2===1;
    const sep = (i>0 && i%5===0)?'<div class="gab-sep"></div>':'';
    const opts = OPTS.map(o=>{
      let cls = 'gab-opt';
      if(mostrarErros && gabarito.length){
        if(o===gabarito[i]) cls+=' correct-answer';
        if(o===sel && sel!==gabarito[i]) cls+=' filled-wrong';
        else if(o===sel && sel===gabarito[i]) cls+=' filled-correct';
      } else {
        if(o===sel) cls+=' filled';
      }
      return `<div class="${cls}" onclick="selResp(${i},'${o}')" data-q="${i}" data-o="${o}">${o}</div>`;
    }).join('');
    html += sep+`<div class="gab-row${sel?' selected-row':''}" id="gabrow_${i}">
      <div class="gab-num">${String(i+1).padStart(2,'0')}</div>
      <div class="gab-opts">${opts}</div>
    </div>`;
  }
  return html;
}
 
let respostasTemp = [];
function selResp(q, o){
  respostasTemp[q] = o;
  const row = document.getElementById('gabrow_'+q);
  if(!row) return;
  row.classList.add('selected-row');
  row.querySelectorAll('.gab-opt').forEach(el=>{
    el.classList.remove('filled');
    if(el.dataset.o===o) el.classList.add('filled');
  });
}
 
function calcularNota(){
  const pvId = document.getElementById('selProva')?.value;
  const alId = document.getElementById('selAluno')?.value;
  if(!pvId){alert('Selecione uma prova!');return}
  if(!alId){alert('Selecione um aluno!');return}
  const pv = getProva(pvId);
  const al = getAluno(alId);
  if(!pv||!al) return;
 
  const resps = Array.from({length:pv.nq},(_,i)=>respostasTemp[i]||null);
  const sem = resps.filter(r=>!r).length;
  if(sem>0 && !confirm(`${sem} questão(ões) sem resposta. Continuar assim?`)) return;
 
  const acertos = resps.filter((r,i)=>r===pv.gab[i]).length;
  const nota = (acertos/pv.nq)*10;
  const valor = pv.valor||10;
  const notaFinal = nota*valor/10;
  const pct = Math.round(acertos/pv.nq*100);
  const sit = nota>=7?'Aprovado ✓':nota>=5?'Recuperação':nota>=0?'Reprovado':'';
  const sitCor = nota>=7?'rgba(255,255,255,.9)':nota>=5?'#ffe9a0':'#ffd0cc';
  const bgGrad = nota>=7?'linear-gradient(135deg,#0c6e52,#0a8f68)':nota>=5?'linear-gradient(135deg,#c47600,#e89a00)':'linear-gradient(135deg,#c23b2b,#e04a37)';
 
  const erros = pv.gab.map((g,i)=>({q:i+1,correta:g,deu:resps[i]})).filter(e=>e.deu!==e.correta);
 
  document.getElementById('resultadoArea').innerHTML = `
    <div class="result-hero" style="background:${bgGrad}">
      <div class="result-nota">${notaFinal.toFixed(1)}</div>
      <div class="result-sit" style="color:${sitCor}">${sit} — ${al.nome}</div>
      <div class="result-sub">${acertos} de ${pv.nq} corretas (${pct}%) · ${pv.materia} — ${pv.desc||'s/d'}</div>
      <div class="result-bar-wrap"><div class="result-bar" style="width:${pct}%"></div></div>
    </div>
    ${erros.length?`
    <div class="card">
      <div class="card-title" style="margin-bottom:12px">Questões erradas — ${erros.length}</div>
      <div class="erros-grid">
        ${erros.map(e=>`<span class="erro-chip wrong">Q${e.q}: ${e.deu||'—'} → ${e.correta}</span>`).join('')}
      </div>
    </div>`:`<div class="card" style="text-align:center;padding:20px"><span style="font-size:32px">🎉</span><br><strong style="color:var(--teal)">Gabarito perfeito!</strong></div>`}
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn btn-primary" onclick="registrarCorrecao('${pvId}','${alId}',${acertos},${pv.nq},${notaFinal.toFixed(2)},${JSON.stringify(resps)})">
        💾 Salvar nos Resultados
      </button>
      <button class="btn" onclick="limparCorrecao()">Nova Correção</button>
    </div>`;
 
  document.getElementById('resultadoArea').scrollIntoView({behavior:'smooth',block:'start'});
}
 
function registrarCorrecao(pvId,alId,acertos,total,nota,respsJSON){
  const resps = typeof respsJSON==='string'?JSON.parse(respsJSON):respsJSON;
  S.correcoes.push({
    id:uid(), turma:S.turma, provaId:pvId, alunoId:alId,
    acertos, total, nota:parseFloat(nota), resps,
    data:new Date().toLocaleDateString('pt-BR')
  });
  save();
  respostasTemp = [];
  setPage('resultados');
}

  setPage('corrigir');
}

function modalProva(){

  const gab = pv?pv.gab:[];
 
  const gabRows = Array.from({length:nq},(_,i)=>{

      const filled = o===sel?'filled':'';
      return `<div class="gab-opt ${filled}" onclick="modalSelGab(${i},'${o}')" data-mq="${i}" data-mo="${o}">${o}</div>`;
    }).join('');
    const sep = (i>0&&i%5===0)?'<div class="gab-sep"></div>':'';
    return sep+`<div class="gab-row${sel?' selected-row':''}" id="mgabrow_${i}">

      <div class="gab-opts">${opts}</div>

  return `<div class="modal-bg" onclick="closeModal(event)"><div class="modal modal-lg">

      </div>

      </div>

      <label>Gabarito oficial — marque as bolinhas</label>

    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModalBtn()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarProva(${editando?`'${S.editProvaId}'`:'null'})">
        ${editando?'Salvar Alterações':'Salvar Gabarito'}
      </button>
    </div>
  </div></div>`;

let modalGabTemp = {};
function modalSelGab(q, o){
  modalGabTemp[q] = o;
  const row = document.getElementById('mgabrow_'+q);
  if(!row) return;
  row.classList.add('selected-row');
  row.querySelectorAll('.gab-opt').forEach(el=>{
    el.classList.remove('filled');
    if(el.dataset.mo===o) el.classList.add('filled');
  });
  // update hidden
  const nq = parseInt(document.getElementById('m_nq')?.value||10);
  const arr = Array.from({length:nq},(_,i)=>modalGabTemp[i]||null);
  const hid = document.getElementById('m_gabData');
  if(hid) hid.value = JSON.stringify(arr);
}
 
function modalAtualizarGab(nqStr, gabStr){
  const nq = Math.min(parseInt(nqStr)||10,60);
  let gab = [];
  try{gab=JSON.parse(gabStr.replace(/&apos;/g,"'"))}catch{}
  // rebuild modalGabTemp
  modalGabTemp = {};
  gab.forEach((v,i)=>{if(v) modalGabTemp[i]=v;});
  const sheet = document.getElementById('modalGabSheet');
  if(!sheet) return;
  let html='';
  for(let i=0;i<nq;i++){
    const sel=modalGabTemp[i]||null;
    const sep=(i>0&&i%5===0)?'<div class="gab-sep"></div>':'';
    const opts=OPTS.map(o=>`<div class="gab-opt${o===sel?' filled':''}" onclick="modalSelGab(${i},'${o}')" data-mq="${i}" data-mo="${o}">${o}</div>`).join('');
    html+=sep+`<div class="gab-row${sel?' selected-row':''}" id="mgabrow_${i}">
      <div class="gab-num">${String(i+1).padStart(2,'0')}</div>
      <div class="gab-opts">${opts}</div>
    </div>`;
  }
  sheet.innerHTML=html;
}

function salvarAluno(){
  const nome = document.getElementById('m_nome')?.value.trim();
  const num = document.getElementById('m_num')?.value.trim();
  if(!nome){alert('Informe o nome do aluno.');return}
  if(!S.alunos[S.turma]) S.alunos[S.turma]=[];
  if(S.alunos[S.turma].find(a=>a.nome.toLowerCase()===nome.toLowerCase())){
    alert('Aluno já cadastrado!');return;
  }
  S.alunos[S.turma].push({id:uid(),nome,numero:num||''});
  save();
  closeModalBtn();
  renderMain();
}
 
function importarAlunos(){
  const txt = document.getElementById('m_lista')?.value||'';
  const nomes = txt.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!nomes.length){alert('Nenhum nome encontrado.');return}
  if(!S.alunos[S.turma]) S.alunos[S.turma]=[];
  let adicionados=0;
  nomes.forEach((nome,i)=>{
    if(!S.alunos[S.turma].find(a=>a.nome.toLowerCase()===nome.toLowerCase())){
      S.alunos[S.turma].push({id:uid(),nome,numero:String(S.alunos[S.turma].length+1).padStart(2,'0')});
      adicionados++;
    }
  });
  save();
  closeModalBtn();
  renderMain();
  alert(`${adicionados} aluno(s) importado(s)!`);
}
 
function delAluno(id){
  if(!confirm('Excluir este aluno? As correções dele serão mantidas.')) return;
  S.alunos[S.turma]=(S.alunos[S.turma]||[]).filter(a=>a.id!==id);
  save();renderMain();
}
 
function salvarProva(editId){
  const nq = Math.min(parseInt(document.getElementById('m_nq')?.value)||10,60);
  let gab=[];
  try{gab=JSON.parse(document.getElementById('m_gabData')?.value||'[]')}catch{}
  // fill missing
  gab=Array.from({length:nq},(_,i)=>gab[i]||'A');
 
  const prova={
    id:editId||uid(),
    turma:S.turma,
    materia:document.getElementById('m_mat')?.value||'Português',
    desc:document.getElementById('m_desc')?.value||'',
    data:document.getElementById('m_data')?.value||'',
    valor:parseFloat(document.getElementById('m_val')?.value)||10,
    nq, gab
  };
  if(editId){
    S.provas=S.provas.map(p=>p.id===editId?prova:p);
  } else {
    S.provas.push(prova);
  }
  save();
  modalGabTemp={};
  S.editProvaId=null;
  closeModalBtn();
  renderMain();
}
 
function editarGabarito(id){
  modalGabTemp={};
  const pv=getProva(id);
  if(pv) pv.gab.forEach((v,i)=>{if(v) modalGabTemp[i]=v;});
  S.editProvaId=id;
  S.modal='editarProva';
  renderModal();
}
 
function delProva(id){
  const ncor=S.correcoes.filter(c=>c.provaId===id).length;
  if(!confirm(`Excluir este gabarito?${ncor?` Há ${ncor} correção(ões) vinculadas que também serão excluídas.`:''}`)) return;
  S.provas=S.provas.filter(p=>p.id!==id);
  S.correcoes=S.correcoes.filter(c=>c.provaId!==id);
  save();renderMain();
}
 
function delCorrecao(id){
  if(!confirm('Excluir esta correção?')) return;
  S.correcoes=S.correcoes.filter(c=>c.id!==id);
  save();renderMain();
}
 
function limparResultados(){
  if(!confirm('Apagar TODAS as correções do '+S.turma+'?')) return;
  S.correcoes=S.correcoes.filter(c=>c.turma!==S.turma);
  save();renderMain();
}
 
function openModal(m){S.modal=m;modalGabTemp={};renderModal();}
function closeModalBtn(){S.modal=null;S.editProvaId=null;renderModal();}
function closeModal(e){if(e.target.classList.contains('modal-bg'))closeModalBtn();}
function setPage(p){S.page=p;respostasTemp=[];renderSidebar();renderMain();}
function setTurma(t){S.turma=t;respostasTemp=[];render();}
function setTurmaPage(t,p){S.turma=t;S.page=p;respostasTemp=[];render();}
 
render();
</script>
</body>
</html>
